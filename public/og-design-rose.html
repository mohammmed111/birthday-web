<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OG Image Design - Rose Theme</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=IBM+Plex+Sans+Arabic:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #FFF6F8;
            padding: 0;
        }

        /* Container fills entire viewport */
        .og-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: radial-gradient(circle at center, #FFFFFF 0%, #FFF6F8 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Organic Background Scatter / Pattern */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.15;
            pointer-events: none;
            /* Using a combination of radial gradients to simulate scattered sparkles/confetti */
            background-image: 
                radial-gradient(3px 3px at 15% 20%, #D4AF37, transparent),
                radial-gradient(4px 4px at 85% 15%, #F66C89, transparent),
                radial-gradient(3px 3px at 25% 75%, #F66C89, transparent),
                radial-gradient(5px 5px at 75% 80%, #D4AF37, transparent),
                radial-gradient(3px 3px at 50% 10%, #D4AF37, transparent),
                radial-gradient(4px 4px at 10% 90%, #F66C89, transparent),
                radial-gradient(3px 3px at 90% 90%, #D4AF37, transparent),
                radial-gradient(4px 4px at 50% 90%, #F66C89, transparent);
            background-size: 100% 100%;
        }

        /* Content Wrapper */
        .content {
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            padding-bottom: 20px;
        }

        /* Circular Seal / Icon */
        .seal {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid #D4AF37;
            background: #FBB6C7; /* Inner secondary pink */
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
            box-shadow: 0 4px 15px rgba(122, 31, 61, 0.15);
        }
        
        .seal::before {
            content: '';
            position: absolute;
            top: 4px;
            left: 4px;
            right: 4px;
            bottom: 4px;
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.5);
        }

        .seal svg {
            width: 50px;
            height: 50px;
            fill: none;
            stroke: #D4AF37;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* Main Headline */
        .headline {
            font-family: 'Amiri', serif;
            font-size: 84px;
            font-weight: 700;
            color: #7A1F3D;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
            text-shadow: 0 4px 15px rgba(122, 31, 61, 0.1);
        }

        /* Tagline */
        .tagline {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-size: 32px;
            font-weight: 400;
            color: #8C6B72;
            letter-spacing: 0.5px;
        }

        /* Footer Strip */
        .footer-strip {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-top: 1px solid rgba(122, 31, 61, 0.08);
            background: linear-gradient(to top, rgba(255, 255, 255, 0.9), transparent);
        }

        .footer-text {
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-size: 20px;
            color: #8C6B72;
            font-weight: 400;
            letter-spacing: 0.5px;
        }

        .domain {
            position: absolute;
            right: 50px;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            font-size: 16px;
            color: rgba(140, 107, 114, 0.6);
            letter-spacing: 1px;
            direction: ltr;
        }

    </style>
</head>
<body>

    <div class="og-container" id="og-image">
        <div class="bg-pattern"></div>
        
        <div class="content">
            <!-- Seal -->
            <div class="seal">
                <svg viewBox="0 0 24 24">
                    <!-- Cake base -->
                    <path d="M4 14v4c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-4" />
                    <!-- Cake top -->
                    <path d="M4 14c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2 0-1.1-.9-2-2-2H6c-1.1 0-2 .9-2 2z" />
                    <!-- Candle -->
                    <path d="M12 12V8" />
                    <!-- Flame -->
                    <path d="M12 8c-.6 0-1-.6-1-1.2 0-.8 1-1.8 1-1.8s1 1 1 1.8c0 .6-.4 1.2-1 1.2z" fill="rgba(212, 175, 55, 0.4)" />
                </svg>
            </div>

            <!-- Titles -->
            <h1 class="headline">تهنئة عيد ميلاد فاخرة</h1>
            <h2 class="tagline">احتفل بلحظة مميزة... بطريقة لا تُنسى</h2>
        </div>

        <!-- Footer -->
        <div class="footer-strip">
            <div class="footer-text">أنشئ تهنئتك التفاعلية الآن — كيك، شموع، وموسيقى في ثوانٍ</div>
            <div class="domain">birthdayweb-ae7a4.web.app</div>
        </div>
    </div>

</body>     
</html>
